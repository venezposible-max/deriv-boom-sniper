<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥇 V100 DUAL SNIPER - CHOCH PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background-color: #050505;
            color: #fff;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            color: #00ffa3;
            margin: 0;
            text-shadow: 0 0 20px rgba(0, 255, 163, 0.4);
        }

        .header p {
            color: #888;
            font-size: 14px;
            margin-top: 5px;
            letter-spacing: 2px;
        }

        .card {
            background: #111;
            border-radius: 20px;
            padding: 25px;
            border: 1px solid #222;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .stat-box {
            text-align: center;
            flex: 1;
        }

        .stat-label {
            font-size: 10px;
            color: #666;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 900;
        }

        .balance-chip {
            background: rgba(0, 255, 163, 0.1);
            border: 1px solid #00ffa3;
            color: #00ffa3;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 10px;
        }

        .price-hero {
            font-size: 3.5rem;
            font-weight: 900;
            text-align: center;
            margin: 10px 0;
            color: #fff;
            line-height: 1;
        }

        .symbol-name {
            font-size: 14px;
            font-weight: 700;
            color: #ffd700;
            text-align: center;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: none;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-start {
            background: linear-gradient(135deg, #00ffa3 0%, #008f5d 100%);
            color: #000;
            box-shadow: 0 10px 20px rgba(0, 255, 163, 0.3);
        }

        .btn-stop {
            background: #ff4d4d;
            color: #fff;
            box-shadow: 0 10px 20px rgba(255, 77, 77, 0.3);
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            color: #888;
            font-weight: 700;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            font-family: inherit;
            font-weight: 700;
        }

        .indicator-bar {
            height: 6px;
            background: #222;
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .indicator-fill {
            height: 100%;
            width: 50%;
            transition: all 0.5s ease;
        }

        .trade-active {
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            border: 1px solid #ffd700;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
            }

            to {
                box-shadow: 0 0 25px rgba(255, 215, 0, 0.5);
            }
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #222;
            font-size: 13px;
        }

        .green {
            color: #00ffa3;
        }

        .market-selector {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .market-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: none;
            color: #666;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .market-btn.active {
            background: #ffd700;
            color: #000;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }

        .market-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 id="mainTitle">🥇 V100 DUAL SNIPER</h1>
            <p id="subTitle">CHOC BREAKOUT + TICK ACCELERATION</p>
        </div>

        <div class="market-selector" id="marketSelector">
            <button id="btnGold" onclick="switchMarket('frxXAUUSD')" class="market-btn active">ORO</button>
            <button id="btnV100" onclick="switchMarket('R_100')" class="market-btn">V100</button>
        </div>

        <div style="text-align: center;">
            <div id="balanceDisplay" class="balance-chip">SALDO: $0.00</div>
        </div>
        <div class="price-hero" id="priceDisplay" style="color: #ffd700;">---</div>
        <div class="symbol-name" id="symbolName">ESPERANDO ORO...</div>

        <div class="card" id="statusCard">
            <div class="stat-row">
                <div class="stat-box">
                    <div class="stat-label">Bot</div>
                    <div id="statusText" class="stat-value">OFF</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Mercado</div>
                    <div id="marketStatusText" class="stat-value">--</div>
                </div>
            </div>
            <div class="stat-row" style="margin-top: 15px;">
                <div class="stat-box">
                    <div class="stat-label">Breakout HH</div>
                    <div id="hhValue" class="stat-value" style="color: #00ffa3;">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Breakout LL</div>
                    <div id="llValue" class="stat-value" style="color: #ff4d4d;">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Señal</div>
                    <div id="signalValue" class="stat-value">WAIT</div>
                </div>
            </div>
            <div class="stat-row" style="margin-top: 20px; border-top: 1px solid #222; padding-top: 15px;">
                <div class="stat-box">
                    <div class="stat-label">Sesión PnL</div>
                    <div id="pnlValue" class="stat-value">$0.00</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Ganados</div>
                    <div id="winsValue" class="stat-value green">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Perdidos</div>
                    <div id="lossesValue" class="stat-value red">0</div>
                </div>
            </div>
            <div class="indicator-bar">
                <div id="accelBar" class="indicator-fill"></div>
            </div>
        </div>

        <div id="tradeCard" class="card trade-active" style="display:none; text-align: center;">
            <div id="tradeType"
                style="font-weight: 900; font-size: 14px; margin-bottom: 5px; text-transform: uppercase;">TIPO</div>
            <div class="stat-label">Posición Activa</div>
            <div style="font-size: 24px; font-weight: 900; margin: 10px 0;" id="tradeProfit">$0.00</div>
            <div class="stat-label" style="margin-bottom: 15px;">Tiempo: <span id="tradeTimer"
                    style="color:#fff;">0</span>s</div>
            <button onclick="sellContract()"
                style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ff4d4d; background: rgba(255, 77, 77, 0.1); color: #ff4d4d; font-weight: 700; cursor: pointer;">CERRAR
                POSICIÓN AHORA 🛑</button>
        </div>

        <div class="card" id="settingsForm">
            <div class="stat-row" style="margin-bottom: 20px;">
                <button id="btnManualUp" onclick="manualTrade('MULTUP')"
                    style="flex:1; margin-right:5px; padding: 15px; border-radius: 12px; border: none; background: #00ffa3; color: #000; font-weight: 900; cursor: pointer;">MANUAL
                    UP 📈</button>
                <button id="btnManualDown" onclick="manualTrade('MULTDOWN')"
                    style="flex:1; margin-left:5px; padding: 15px; border-radius: 12px; border: none; background: #ff4d4d; color: #fff; font-weight: 900; cursor: pointer;">MANUAL
                    DOWN 📉</button>
            </div>
            <div class="input-group">
                <label>Inversión (Stake USD)</label>
                <input type="number" id="stake" value="10">
            </div>
            <div class="input-group">
                <label>Multiplicador (x100 a x800)</label>
                <input type="number" id="multiplier" value="200" step="100">
            </div>
            <div class="stat-row">
                <div class="input-group" style="flex:1; margin-right:10px;">
                    <label>Take Profit ($)</label>
                    <input type="number" id="takeProfit" step="0.5" value="5.0">
                </div>
                <div class="input-group" style="flex:1;">
                    <label>Stop Loss ($)</label>
                    <input type="number" id="stopLoss" step="0.5" value="10.0">
                </div>
            </div>
            <button id="btnToggle" class="btn-main btn-start" onclick="toggleBot()">Iniciar Sniper 🥇</button>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div class="stat-label" style="margin: 0;">Historial Reciente</div>
                <button onclick="clearHistory()"
                    style="background: none; border: 1px solid #444; color: #888; padding: 5px 10px; border-radius: 8px; font-size: 10px; cursor: pointer; text-transform: uppercase; font-weight: 700;">Borrar
                    Historial</button>
            </div>
            <div id="history"></div>
        </div>
    </div>

    <script>
        let isRunning = false;
        let inputsLoaded = false;
        let isFetching = false;

        async function fetchStatus() {
            if (isFetching) return;
            isFetching = true;

            try {
                const res = await fetch('/api/status');
                const { data, config } = await res.json();

                isRunning = data.isRunning;
                const price = parseFloat(data.lastTickPrice);
                const priceDisplay = document.getElementById('priceDisplay');

                if (data.marketStatus === 'CLOSED') {
                    priceDisplay.innerText = "MERCADO CERRADO";
                    priceDisplay.style.fontSize = "1.8rem";
                    priceDisplay.style.color = "#ff4d4d";
                } else if (price > 0) {
                    priceDisplay.innerText = price.toFixed(2);
                    priceDisplay.style.fontSize = "3.5rem";
                    priceDisplay.style.color = "#ffd700";
                } else {
                    priceDisplay.innerText = "Cargando...";
                    priceDisplay.style.fontSize = "2.0rem";
                    priceDisplay.style.color = "#ffd700";
                }

                document.getElementById('balanceDisplay').innerText = "SALDO: $" + (data.balance || 0).toFixed(2);

                const isGold = data.symbol === 'frxXAUUSD';
                document.getElementById('symbolName').innerText = isGold ? "⚡ MERCADO: ORO (XAUUSD)" : "⚡ MERCADO: VOLATILITY 100";
                document.getElementById('symbolName').style.color = isGold ? "#ffd700" : "#00ffa3";

                document.getElementById('mainTitle').innerText = isGold ? "🥇 GOLD SNIPER PRO" : "⚡ V100 DUAL SNIPER";
                document.getElementById('subTitle').innerText = isGold ? "XAUUSD MEAN REVERSION" : "CHOCH + TICK ACCELERATION";

                document.getElementById('btnGold').className = "market-btn " + (isGold ? "active" : "");
                document.getElementById('btnV100').className = "market-btn " + (!isGold ? "active" : "");

                document.getElementById('btnGold').disabled = isRunning;
                document.getElementById('btnV100').disabled = isRunning;

                document.getElementById('statusText').innerText = isRunning ? "ON" : "OFF";
                document.getElementById('statusText').className = "stat-value " + (isRunning ? "green" : "");

                const mStatus = document.getElementById('marketStatusText');
                if (data.marketStatus === 'CLOSED') {
                    mStatus.innerText = "CERRADO";
                    mStatus.style.color = "#ff4d4d";
                } else if (data.marketStatus === 'OPEN') {
                    mStatus.innerText = "ABIERTO";
                    mStatus.style.color = "#00ffa3";
                } else {
                    mStatus.innerText = "BUSCANDO...";
                    mStatus.style.color = "#ffd700";
                }

                // Bloquear inputs y botones si el bot está corriendo
                const inputIds = ['stake', 'multiplier', 'takeProfit', 'stopLoss'];
                inputIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.disabled = isRunning;
                });

                document.getElementById('btnManualUp').disabled = isRunning;
                document.getElementById('btnManualDown').disabled = isRunning;
                document.getElementById('btnManualUp').style.opacity = isRunning ? "0.3" : "1";
                document.getElementById('btnManualDown').style.opacity = isRunning ? "0.3" : "1";

                // Cargar valores del servidor SOLO la primera vez
                if (config && !inputsLoaded) {
                    const mapping = {
                        stake: 'stake',
                        multiplier: 'multiplier',
                        takeProfit: 'takeProfit',
                        stopLoss: 'stopLoss'
                    };
                    Object.keys(mapping).forEach(id => {
                        const el = document.getElementById(id);
                        const serverKey = mapping[id];
                        if (el && config[serverKey] !== undefined) {
                            el.value = config[serverKey];
                        }
                    });
                    inputsLoaded = true;
                }

                const struct = data.lastV100Structure || { hh: 0, ll: 0, lastSignal: 'WAIT' };
                document.getElementById('hhValue').innerText = struct.hh.toFixed(2);
                document.getElementById('llValue').innerText = struct.ll.toFixed(2);

                const sig = document.getElementById('signalValue');
                sig.innerText = struct.lastSignal;
                if (struct.lastSignal === 'UP') sig.style.color = "#00ffa3";
                else if (struct.lastSignal === 'DOWN') sig.style.color = "#ff4d4d";
                else sig.style.color = "#888";

                const accelBar = document.getElementById('accelBar');
                const accelVal = Math.min(100, (data.tickAcceleration || 0) * 1000);
                accelBar.style.width = accelVal + "%";
                accelBar.style.backgroundColor = accelVal > 50 ? "#00ffa3" : "#ffd700";

                document.getElementById('pnlValue').innerText = "$" + data.pnlSession.toFixed(2);
                document.getElementById('pnlValue').className = "stat-value " + (data.pnlSession >= 0 ? "green" : "red");

                document.getElementById('winsValue').innerText = data.winsSession;
                document.getElementById('lossesValue').innerText = data.lossesSession;

                const tradeCard = document.getElementById('tradeCard');
                if (data.activeContracts && data.activeContracts.length > 0) {
                    tradeCard.style.display = 'block';
                    // Si hay varios, mostramos un resumen o el primero, pero el contenedor estará visible
                    // Mejor aún, inyectamos todos los activos
                    tradeCard.innerHTML = data.activeContracts.map(c => `
                        <div style="margin-bottom: 15px; border-bottom: 1px solid rgba(255,215,0,0.2); padding-bottom: 15px;">
                            <div style="font-weight: 900; font-size: 14px; color: ${c.type === 'MULTUP' ? '#00ffa3' : '#ff4d4d'};">
                                ${c.type === 'MULTUP' ? 'COMPRA 🔼' : 'VENTA 🔽'}
                            </div>
                            <div style="font-size: 24px; font-weight: 900; margin: 5px 0;" class="${c.profit >= 0 ? 'green' : 'red'}">
                                ${c.profit >= 0 ? "+" : ""}$${c.profit.toFixed(2)}
                            </div>
                            <div class="stat-label">Tiempo: ${c.seconds}s</div>
                        </div>
                    `).join('') + `
                        <button onclick="sellContract()" 
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ff4d4d; background: rgba(255, 77, 77, 0.1); color: #ff4d4d; font-weight: 700; cursor: pointer;">
                        CERRAR POSICIÓN ACTIVA 🛑</button>
                    `;
                } else {
                    tradeCard.style.display = 'none';
                }

                const btn = document.getElementById('btnToggle');
                btn.innerText = isRunning ? "Detener Sniper ⏸️" : "Iniciar Sniper 🥇";
                btn.className = "btn-main " + (isRunning ? "btn-stop" : "btn-start");

                const hist = document.getElementById('history');
                hist.innerHTML = data.tradeHistory.map(t => `
                    <div class="history-item">
                        <span>${t.time} - ${t.type}</span>
                        <span class="${t.profit >= 0 ? 'green' : 'red'}">${t.profit >= 0 ? '+' : ''}$${t.profit.toFixed(2)}</span>
                    </div>
                `).join('');
            } catch (e) {
                // Si hay un error (ej. caída de internet o servidor reiniciando)
                // Mantener los últimos datos en pantalla silenciosamente como caché visual.
                console.warn('Conexión inestable: manteniendo caché visual en pantalla.', e);
            } finally {
                isFetching = false;
            }
        }

        async function toggleBot() {
            const action = isRunning ? 'STOP' : 'START';
            const body = action === 'START' ? {
                action,
                stake: document.getElementById('stake').value,
                multiplier: document.getElementById('multiplier').value,
                takeProfit: document.getElementById('takeProfit').value,
                stopLoss: document.getElementById('stopLoss').value
            } : { action };

            try {
                await fetch('/api/control', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                fetchStatus();
            } catch (e) {
                console.error("Error contactando al servidor:", e);
                // Si falla, fetchStatus forzará el estado OFFLINE en breve
            }
        }

        async function clearHistory() {
            if (!confirm("¿Seguro que quieres borrar todo el historial y las estadísticas?")) return;
            await fetch('/api/clear-history', { method: 'POST' });
            fetchStatus();
        }

        async function sellContract() {
            if (!confirm("¿Quieres cerrar la operación actual manualmente?")) return;
            try {
                await fetch('/api/sell-contract', { method: 'POST' });
                fetchStatus();
            } catch (e) { console.error(e); }
        }

        async function manualTrade(action) {
            try {
                await fetch('/api/trade', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action })
                });
                fetchStatus();
            } catch (e) { console.error(e); }
        }

        async function switchMarket(symbol) {
            if (isRunning) return;
            // Reset visual
            document.getElementById('priceDisplay').innerText = "Sincronizando...";
            document.getElementById('priceDisplay').style.color = "#ffd700";

            const res = await fetch('/api/switch-market', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ symbol })
            });
            if (res.ok) {
                inputsLoaded = false; // Forzar recarga de valores específicos del mercado
                fetchStatus();
            }
        }

        setInterval(fetchStatus, 1000);
    </script>
</body>

</html>
